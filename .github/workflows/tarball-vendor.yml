# This reusable workflow creates the source tarball and the vendor tarball for distribution.
#
# Workflow inputs:
# - None
#
# Workflow artifacts:
# - qrmi-vendor-tarball: qrmi-{version}-vendor.tar.gz
#
# Workflow dependencies:
# - None. It does not depend on any other workflow.

name: Create vendor tarball
on:
  workflow_call:
jobs:
  source-tarball:
    runs-on: ubuntu-24.04
    container:
      image: registry.access.redhat.com/ubi8/ubi:8.10
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install build dependencies
      run: ./tools/install-build-deps.sh

    - name: Get QRMI information
      id: qrmi-info
      run: |
        QRMI_VERSION=$(make get-qrmi-version)
        echo "version=$QRMI_VERSION" >> $GITHUB_OUTPUT

    - name: Create vendor tarball
      run: make tarball-vendor

    - name: Upload tarballs
      uses: actions/upload-artifact@v4
      with:
        name: qrmi-vendor-tarball
        path: qrmi-${{ steps.qrmi-info.outputs.version }}-vendor.tar.gz
        if-no-files-found: error
