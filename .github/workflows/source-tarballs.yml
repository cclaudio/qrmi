# This reusable workflow creates the source code tarball and the vendor tarball for distribution.
#
# Workflow inputs:
# - None
#
# Workflow artifacts produced:
# - [uploaded] qrmi-source-tarballs  (qrmi-{version}.tar.gz, qrmi-{version}-vendor.tar.gz)
#
# Workflow dependencies:
# - None. It does not depend on any other workflow.

name: Create source and vendor tarballs
on:
  workflow_call:
jobs:
  dist:
    runs-on: ubuntu-24.04
    steps:
    - name: Install RHEL build dependencies
      run: |
        make install-rhel-build-deps

    - name: Checkout
      uses: actions/checkout@v4

    - name: Get QRMI version
      id: qrmi-version
      run: |
        VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
        echo "value=$VERSION" >> $GITHUB_OUTPUT
        echo "QRMI version: $VERSION"

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Create source and vendor tarballs
      run: make dist

    - name: Upload tarballs
      uses: actions/upload-artifact@v4
      with:
        name: qrmi-source-tarballs
        path: |
          qrmi-${{ steps.qrmi-version.outputs.value }}.tar.gz
          qrmi-${{ steps.qrmi-version.outputs.value }}-vendor.tar.gz
        if-no-files-found: error
