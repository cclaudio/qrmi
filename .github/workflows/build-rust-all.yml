---
# This reusable workflow builds the libqrmi.so, binaries, Rust and C examples
#
# Workflow inputs:
# - container-image
#
# Workflow artifacts:
# - None
#
# Workflow dependencies:
# - None. It does not dependend on any other workflow.

name: Build all Rust code and the C examples
on:
  workflow_call:
    inputs:
      container-image:
        description: >-
          Container image to use for building (e.g., 'registry.access.redhat.com/ubi8/ubi:8.10' or 'ubuntu:24.04')
        type: string
        required: true
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.container-image }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install build dependencies
      run: ./tools/install-build-deps.sh

    - name: Build all Rust code
      run: make build-rust-all

    # Requires the libqrmi.so and qrmi.h built in the previous step
    - name: Build all C examples
      run: make build-c-examples